// Gradle 9+ forbids resolving a subproject's Configuration from the root.
// Consume each subproject's javadocClasspathElements via project dependencies instead.
configurations {
  aggregatedJavadocClasspath {
    canBeConsumed = false
    canBeResolved = true
  }
}

task aggregatedJavadoc(type: Javadoc) {
  destinationDir = file("${layout.buildDirectory.get().asFile.path}/docs/javadoc")
}

gradle.projectsEvaluated {
  // Validate that no module depends on test output directly
  def protectedModules = [
    'clients': ':clients',
    'server-common': ':server-common',
    'server': ':server',
    'storage/api': ':storage:storage-api',
    'coordinator-common': ':coordinator-common',
    'storage': ':storage',
    'group-coordinator': ':group-coordinator',
    'share-coordinator': ':share-coordinator',
    'metadata': ':metadata',
    'raft': ':raft',
  ]
  allprojects { proj ->
    proj.configurations.all { config ->
      config.dependencies.each { dep ->
        if (dep instanceof FileCollectionDependency) {
          dep.files.files.each { file ->
            protectedModules.each { dir, projectPath ->
              if (file.absolutePath.endsWith("/${dir}/build/classes/java/test")) {
                throw new GradleException("""
ERROR: Dependency on ${projectPath} test output is not allowed.
Found in project ${proj.path} configuration '${config.name}'.
Use `testFixtures(project('${projectPath}'))` instead of `project('${projectPath}').sourceSets.test.output`
""")
              }
            }
          }
        }
      }
    }
  }

  def projectsWithJavadoc = subprojects.findAll { it.javadoc.enabled }

  projectsWithJavadoc.each { sp ->
    dependencies.add('aggregatedJavadocClasspath',
        dependencies.project(path: sp.path, configuration: 'javadocClasspathElements'))
  }

  tasks.named('aggregatedJavadoc').configure {
    dependsOn projectsWithJavadoc.collect { "${it.path}:compileJava" }
    source    projectsWithJavadoc.collect { it.sourceSets.main.allJava }
    classpath = configurations.aggregatedJavadocClasspath
    includes  = projectsWithJavadoc.collectMany { it.javadoc.getIncludes() }
    excludes  = projectsWithJavadoc.collectMany { it.javadoc.getExcludes() }
  }
}



// Helper to get version targets and expected patterns
ext.getVersionTargets = { rawVersion ->
    // Python Package Version (PEP 440): 4.3.0.dev0
    def pythonVersion = rawVersion.contains("SNAPSHOT") ?
            rawVersion.replace("-SNAPSHOT", ".dev0") :
            rawVersion

    def baseVersion = rawVersion.replace("-SNAPSHOT", "")

    return [
      // 1. kafka-merge-pr.py
      [
        path: "committer-tools/kafka-merge-pr.py",
        // Regex: match DEFAULT_FIX_VERSION = os.environ.get("DEFAULT_FIX_VERSION", "...")
        pattern: /DEFAULT_FIX_VERSION\s*=\s*os\.environ\.get\("DEFAULT_FIX_VERSION",\s*".*?"\)/,
        replace: "DEFAULT_FIX_VERSION = os.environ.get(\"DEFAULT_FIX_VERSION\", \"${baseVersion}\")"
      ],
      // 2. version.py
      [
        path: "tests/kafkatest/version.py",
        pattern: /DEV_VERSION\s*=\s*KafkaVersion\(".*"\)/,
        replace: "DEV_VERSION = KafkaVersion(\"${rawVersion}\")"
      ],
      // 3. __init__.py
      [
        path: "tests/kafkatest/__init__.py",
        pattern: /__version__\s*=\s*'.*'/,
        replace: "__version__ = '${pythonVersion}'"
      ],
      // 4. Maven POMs
      [
        path: "streams/quickstart/pom.xml",
        pattern: /(?s)(<artifactId>streams-quickstart<\/artifactId>.*?<version>)([^<]+)(<\/version>)/,
        replace: { "\$1${rawVersion}\$3" }
      ],
      [
        path: "streams/quickstart/java/pom.xml",
        pattern: /(?s)(<artifactId>streams-quickstart<\/artifactId>.*?<version>)([^<]+)(<\/version>)/,
        replace: { "\$1${rawVersion}\$3" }
      ],
      [
        path: "streams/quickstart/java/src/main/resources/archetype-resources/pom.xml",
        pattern: /(<kafka\.version>)([^<]+)(<\/kafka\.version>)/,
        replace: { "\$1${rawVersion}\$3" }
      ]
    ]
}

def updateVersionTask = tasks.register('updateVersion') {
  group = "Release"
  description = "Syncs python, pom, and script versions with gradle.properties. Fails if files or patterns are missing. Use -PnewVersion=X.Y.Z to set a new version."

  doLast {
    def rawVersion
    if (project.hasProperty('newVersion')) {
      rawVersion = newVersion
      if (!rawVersion.matches(/^[0-9]+\.[0-9]+\.[0-9]+(-SNAPSHOT)?$/)) {
        throw new GradleException("Invalid version format: '${rawVersion}'. Expected format: X.Y.Z or X.Y.Z-SNAPSHOT")
      }
      // Update gradle.properties
      def gradlePropsFile = file("${project.rootDir}/gradle.properties")
      if (gradlePropsFile.exists()) {
        def propsContent = gradlePropsFile.text
        def newPropsContent = propsContent.replaceAll(/(?m)^version\s*=.*/, "version=${rawVersion}")
        if (propsContent != newPropsContent) {
          gradlePropsFile.text = newPropsContent
          println "Updated gradle.properties to version ${rawVersion}"
        }
      }
    } else {
      rawVersion = project.version.toString()
    }

    def targets = getVersionTargets(rawVersion)

    targets.each { item ->
      def f = file("${project.rootDir}/${item.path}")

      // Check 1: file must exist
      if (!f.exists()) {
        throw new GradleException("File not found: ${item.path}")
      }

      def content = f.text
      // Check 2: regex must match
      def matcher = (content =~ item.pattern)
      if (!matcher.find()) {
        throw new GradleException("Pattern not found in ${item.path}.\nExpected pattern: ${item.pattern}")
      }

      def replacementStr = item.replace instanceof Closure ? item.replace.call() : item.replace

      def newContent = content.replaceAll(item.pattern, replacementStr)

      if (content != newContent) {
        f.text = newContent
        println "Updated ${item.path}"
      }
    }
  }
}

def verifyVersionConsistencyTask = tasks.register('verifyVersionConsistency') {
  group = "Verification"
  description = "Verifies that python, pom, and script versions match gradle.properties."

  doLast {
    def rawVersion = project.version.toString()
    def targets = getVersionTargets(rawVersion)
    def inconsistentFiles = []

    targets.each { item ->
      def f = file("${project.rootDir}/${item.path}")
      if (!f.exists()) {
        throw new GradleException("File not found: ${item.path}")
      }

      def content = f.text
      // Check if regex matches current content "as is"
      // Note: We need to see if the file content *already* matches what we want it to be.
      // One way is to simulate the replacement and see if it changes nothing.
      
      def replacementStr = item.replace instanceof Closure ? item.replace.call() : item.replace
      def newContent = content.replaceAll(item.pattern, replacementStr)

      if (content != newContent) {
        inconsistentFiles.add(item.path)
      }
    }

    if (!inconsistentFiles.isEmpty()) {
       throw new GradleException("Found inconsistent versions in the following files:\n" + 
           inconsistentFiles.join("\n") + 
           "\n\nPlease run './gradlew updateVersion -PnewVersion=...' to fix them.")
    }
    println "All versions are consistent."
  }
}

check.dependsOn verifyVersionConsistencyTask

def verifyLatestStableMetadataVersionTask = tasks.register('verifyLatestStableMetadataVersion') {
  group = "Verification"
  description = "Verifies that LATEST_STABLE_METADATA_VERSION in version.py matches LATEST_PRODUCTION in MetadataVersion.java"

  doLast {
    // Extract enum constant name that LATEST_PRODUCTION points to, e.g. LATEST_PRODUCTION = IBP_4_3_IV0 -> IBP_4_3_IV0
    def mvContent = file("${project.rootDir}/server-common/src/main/java/org/apache/kafka/server/common/MetadataVersion.java").text
    def pyContent = file("${project.rootDir}/tests/kafkatest/version.py").text

    def latestProductionEnumName = mvContent =~ /LATEST_PRODUCTION\s*=\s*(IBP_\w+)/
    if (!latestProductionEnumName) throw new GradleException("Could not find LATEST_PRODUCTION in MetadataVersion.java")
    def latestProductionEnumConstant = latestProductionEnumName[0][1] // e.g. "IBP_4_3_IV0"

    // Extract version from enum constant, e.g. IBP_4_3_IV0(30, "4.3", "IV0", true) -> 4.3-IV0
    def enumMatch = mvContent =~ /${latestProductionEnumConstant}\(\d+,\s*"(\d+\.\d+)",\s*"(IV\d+)"/
    if (!enumMatch) throw new GradleException("Could not find enum definition for ${latestProductionEnumConstant} in MetadataVersion.java")
    def javaVersion = "${enumMatch[0][1]}-${enumMatch[0][2]}" // e.g. "4.3-IV0"

    def pyMatch = pyContent =~ /LATEST_STABLE_METADATA_VERSION\s*=\s*"([^"]+)"/
    if (!pyMatch) throw new GradleException("LATEST_STABLE_METADATA_VERSION not found in version.py")
    def pyVersion = pyMatch[0][1] // e.g. "4.3-IV0"

    if (javaVersion != pyVersion) {
      throw new GradleException(
        "LATEST_STABLE_METADATA_VERSION mismatch: MetadataVersion.java LATEST_PRODUCTION=${javaVersion}, " +
        "tests/kafkatest/version.py LATEST_STABLE_METADATA_VERSION=${pyVersion}. " +
        "Make sure LATEST_PRODUCTION in MetadataVersion.java and LATEST_STABLE_METADATA_VERSION in tests/kafkatest/version.py are in sync."
      )
    }
    println "MetadataVersion.java LATEST_PRODUCTION=${latestProductionEnumConstant} (${javaVersion}) matches version.py LATEST_STABLE_METADATA_VERSION=${pyVersion}"
  }
}

check.dependsOn verifyLatestStableMetadataVersionTask
