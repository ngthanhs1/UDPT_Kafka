      xml.enabled(project.hasProperty('xmlSpotBugsReport') || project.hasProperty('xmlFindBugsReport'))
      html.enabled(!project.hasProperty('xmlSpotBugsReport') && !project.hasProperty('xmlFindBugsReport'))
    }
    maxHeapSize = defaultMaxHeapSize
    jvmArgs = defaultJvmArgs
  }

  // Ignore core since its a scala project
  if (it.path != ':core') {
    if (userEnableTestCoverage) {
      apply plugin: "jacoco"

      jacoco {
        toolVersion = versions.jacoco
      }

      jacocoTestReport {
        dependsOn tasks.test
        sourceSets sourceSets.main
        reports {
          html.required = true
          xml.required = true
          csv.required = false
        }
      }

    }
  }

  if (userEnableTestCoverage) {
    def coverageGen = it.path == ':core' ? 'reportTestScoverage' : 'jacocoTestReport'
    tasks.register('reportCoverage').configure { dependsOn(coverageGen) }
  }

  dependencyCheck {
    suppressionFile = "$rootDir/gradle/resources/dependencycheck-suppressions.xml"
    skipProjects = [ ":jmh-benchmarks", ":trogdor" ]
    skipConfigurations = [ "zinc" ]
  }
  apply plugin: 'com.diffplug.spotless'
  spotless {
    java {
      targetExclude('**/generated/**/*.java','**/generated-test/**/*.java')
      importOrder('kafka', 'org.apache.kafka', 'com', 'net', 'org', 'java', 'javax', '', '\\#')
      // removeUnusedImports is intentionally omitted because its engines
      // (google-java-format, cleanthat) can non-deterministically throw
      // InvocationTargetException under parallel execution. Unused imports are
      // still enforced by checkstyle (UnusedImports + RedundantImport).
      // Re-enable once https://github.com/diffplug/spotless/issues/2850 is fixed.
    }
  }

  tasks.register("checkJsonLicenseHeader") {
    group = "Verification"
    description = "Verify ASF License header in JSON files"

    doLast {
      def asfHeader = file("${rootProject.projectDir}/gradle/LICENSE.json").readLines()*.trim()

      def incorrectFiles = fileTree(projectDir) {
        include 'src/main/resources/**/*.json'
        include 'src/test/resources/**/*.json'
      }.findAll { f ->
        f.readLines().take(asfHeader.size())*.trim() != asfHeader
      }

      if (incorrectFiles) {
        println "\n${project.name}: Incorrect ASF license header in JSON files:"
        incorrectFiles.each { println "  - $it" }
        throw new GradleException("${incorrectFiles.size()} JSON files with incorrect ASF license header")
      }
    }
  }
  check.dependsOn("checkJsonLicenseHeader")
}

