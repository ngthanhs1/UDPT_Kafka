<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Kafka Dashboard</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <h1>Kafka Order Processing Dashboard</h1>

    <div class="actions">
        <button onclick="sendSuccess()">
            Send Success Order
        </button>

        <button onclick="sendFailed()">
            Send Failed Order
        </button>
    </div>

    <div class="cards">

        <div class="card">
            <h3>System Status</h3>

            <p>Kafka Broker : ONLINE</p>
            <p>Consumer C1 : ACTIVE</p>
            <p>Consumer C2 : ACTIVE</p>
            <p>Retry Consumer : ACTIVE</p>
            <p>DLQ Consumer : ACTIVE</p>

        </div>

        <div class="card">
            <h3>Statistics</h3>

            <p id="successCount">Success: 0</p>
            <p id="retryCount">Retry: 0</p>
            <p id="dlqCount">DLQ: 0</p>

        </div>

    </div>

    <div class="log-box">

        <h2>Activity Log</h2>

        <pre id="logs"></pre>

    </div>

</div>

<script src="app.js"></script>

</body>
</html>
